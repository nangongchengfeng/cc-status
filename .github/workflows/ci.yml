name: Build and Test

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test Client
        working-directory: ./client
        run: go test -v -timeout 120s -parallel 1 ./...

      - name: Test Server
        working-directory: ./server
        run: go test -v -timeout 60s -parallel 1 ./...

  release:
    name: Release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: cc-usage-client-linux-amd64
            server-artifact: cc-usage-server-linux-amd64
          - os: windows-latest
            artifact: cc-usage-client-windows-amd64.exe
            server-artifact: cc-usage-server-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build Client
        working-directory: ./client
        run: |
          go build -ldflags="-s -w" -o "../${{ matrix.artifact }}" ./cmd/cc-usage-client

      - name: Build Web Frontend
        working-directory: ./web
        run: |
          npm ci
          npm run build

      - name: Prepare Web Assets for Embed
        shell: bash
        run: |
          mkdir -p server/internal/handler/ui/dist
          cp -r web/dist/* server/internal/handler/ui/dist/

      - name: Build Server (with embedded web, statically linked)
        working-directory: ./server
        env:
          CGO_ENABLED: 0
        run: |
          go build -tags embed -ldflags="-s -w -extldflags=-static" -o "../${{ matrix.server-artifact }}" ./cmd/server

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.server-artifact }}
