name: Build and Test

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test Client
        working-directory: ./client
        run: go test -v ./...

      - name: Test Server
        working-directory: ./server
        run: go test -v ./...

  release:
    name: Release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: cc-usage-client-linux-amd64
            server-artifact: cc-usage-server-linux-amd64
          - os: windows-latest
            artifact: cc-usage-client-windows-amd64.exe
            server-artifact: cc-usage-server-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Client
        working-directory: ./client
        run: |
          go build -ldflags="-s -w" -o "../${{ matrix.artifact }}" ./cmd/cc-usage-client

      - name: Build Server
        working-directory: ./server
        run: |
          go build -ldflags="-s -w" -o "../${{ matrix.server-artifact }}" ./cmd/server

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.server-artifact }}
